<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOS ANGELES PROJECT | LA角色扮演企劃</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: #e0e0e0; line-height: 1.6; }
        header { background-color: #1a1a1a; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #1e40af; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 15px; }
        .logo { font-size: 1.5rem; font-weight: bold; color: #ffffff; letter-spacing: 2px; }
        .logo span { color: #f59e0b; }
        nav ul { list-style: none; display: flex; gap: 10px; flex-wrap: wrap; }
        nav a { color: #e0e0e0; text-decoration: none; font-weight: 500; font-size: 0.9rem; transition: 0.3s; cursor: pointer; padding: 8px 12px; border-radius: 4px; background-color: #222; }
        nav a:hover, nav a.active { background-color: #1e40af; color: white; }
        .tab-content { display: none; animation: fadeIn 0.4s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        section { padding: 40px 5%; max-width: 1200px; margin: 0 auto; min-height: 75vh; }
        h2.section-title { font-size: 1.8rem; margin-bottom: 25px; color: #fff; border-left: 5px solid #1e40af; padding-left: 15px; }
        .btn { display: inline-block; background-color: #1e40af; color: white; padding: 12px 28px; text-decoration: none; border-radius: 5px; font-weight: bold; transition: 0.3s; border: none; cursor: pointer; margin-top: 15px; }
        .btn:hover { background-color: #1e3a8a; }
        .hero { text-align: center; padding: 80px 20px; background: linear-gradient(rgba(18, 18, 18, 0.7), rgba(18, 18, 18, 0.9)), url('https://images.unsplash.com/photo-1542738738-5537d6ed792b?auto=format&fit=crop&w=1920&q=80') center/cover; border-radius: 8px; margin-bottom: 40px; border: 1px solid #333; }
        .hero h1 { font-size: 3.5rem; color: #ffffff; margin-bottom: 15px; letter-spacing: 1px; }
        .announcement-box { background-color: #1a1a1a; border-left: 5px solid #f59e0b; padding: 25px; border-radius: 8px; margin-bottom: 40px; border: 1px solid #333; }
        .accordion { background-color: #1e1e1e; color: #fff; cursor: pointer; padding: 18px; width: 100%; text-align: left; border: none; border-bottom: 1px solid #333; font-size: 1.1rem; font-weight: bold; }
        .panel { padding: 0 18px; background-color: #121212; max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .panel p { padding: 12px 0; color: #aaa; border-bottom: 1px dashed #333; font-size: 0.95rem; }
        .law-code { color: #f59e0b; font-weight: bold; margin-right: 15px; display: inline-block; min-width: 140px; }
        .fine-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        .fine-table th, .fine-table td { padding: 15px; border: 1px solid #333; text-align: left; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background-color: #1e1e1e; padding: 25px; border-radius: 8px; border-top: 3px solid #1e40af; }
        .dept-card { border-top: 4px solid #fff; }
        .dept-lapd { border-top-color: #1e3a8a; }
        .dept-lasd { border-top-color: #166534; }
        .dept-chp { border-top-color: #b45309; }
        .dept-lafd { border-top-color: #991b1b; }
        .badge-title { font-size: 0.8rem; font-weight: bold; padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 10px; }
        
        /* BOLO 終端表單 */
        #bolo-form-container { display: none; background-color: #161616; padding: 30px; border: 2px solid #ef4444; border-radius: 8px; margin-bottom: 40px; }
        .form-row { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 15px; }
        .form-col { flex: 1; min-width: 250px; }
        .form-col input, .form-col select { width: 100%; padding: 10px; background-color: #121212; border: 1px solid #333; color: white; border-radius: 4px; }
        
        .quiz-box { background-color: #1e1e1e; padding: 30px; border-radius: 8px; }
        .quiz-q { margin-bottom: 15px; color: #e0e0e0; font-weight: bold; }
        .quiz-options label { display: block; margin-bottom: 10px; color: #aaa; cursor: pointer; padding: 10px; background-color: #121212; }
        #quiz-questions-area { display: none; }
        #apply-link-box { display: none; margin-top: 25px; padding: 20px; background-color: #166534; text-align: center; }
        footer { text-align: center; padding: 25px; border-top: 1px solid #333; color: #666; }
    </style>
</head>
<body>

<header>
    <div class="logo">LA<span> PROJECT</span></div>
    <nav>
        <ul>
            <li><a onclick="openTab('page-home')" id="nav-home" class="active">首頁</a></li>
            <li><a onclick="openTab('page-bolo')" id="nav-bolo">🚨 BOLO</a></li>
            <li><a onclick="openTab('page-depts')" id="nav-depts">部門</a></li>
            <li><a onclick="openTab('page-rules')" id="nav-rules">法規</a></li>
            <li><a onclick="openTab('page-sop')" id="nav-sop">SOP</a></li>
            <li><a onclick="openTab('page-apply')" id="nav-apply">招募</a></li>
        </ul>
    </nav>
</header>

<div id="page-home" class="tab-content active">
    <section>
        <div class="hero">
            <h1>LOS ANGELES PROJECT</h1>
            <p>天使之城，執法為先。</p>
            <a onclick="openTab('page-apply')" class="btn">前往警校招募中心</a>
        </div>
    </section>
</div>

<div id="page-bolo" class="tab-content">
    <section>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 class="section-title">全州通緝 (BOLO)</h2>
            <button class="btn" onclick="checkBoloPassword()" style="background-color:#ef4444;">🚨 發布通緝 (登入)</button>
        </div>
        <div id="bolo-form-container">
            <h3>🖥️ MDT 發布終端</h3>
            <div class="form-row">
                <div class="form-col"><label>發布警員</label><input type="text" id="bolo-officer" placeholder="姓名/代號..."></div>
                <div class="form-col"><label>案發地點</label><input type="text" id="bolo-location" placeholder="地點..."></div>
            </div>
            <div class="form-row">
                <div class="form-col"><label>標題</label><input type="text" id="bolo-title" placeholder="案件簡稱..."></div>
                <div class="form-col"><label>危險度</label><select id="bolo-level"><option value="red">紅</option><option value="yellow">黃</option><option value="blue">藍</option></select></div>
            </div>
            <div class="form-row">
                <div class="form-col"><label>目標</label><input type="text" id="bolo-target"></div>
                <div class="form-col"><label>車牌</label><input type="text" id="bolo-plate"></div>
            </div>
            <div class="form-row">
                <div class="form-col" style="flex:100%"><label>特徵/法條/指示/圖片</label><input type="text" id="bolo-desc" placeholder="特徵..."><input type="text" id="bolo-law" placeholder="法條..."><input type="text" id="bolo-action" placeholder="指示..."><input type="text" id="bolo-img" placeholder="圖片連結..."></div>
            </div>
            <button class="btn" onclick="submitBoloWebhook()">廣播至 Discord</button>
        </div>
    </section>
</div>

<!-- (省略中間過長的部門介紹與法規面板，請確保完整複製) -->

<div id="page-apply" class="tab-content">
    <section>
        <h2 class="section-title">招募中心</h2>
        <div class="quiz-box">
            <div id="quiz-start-area">
                <input type="text" id="civilian-name" placeholder="市民角色名稱...">
                <button class="btn" onclick="startQuiz()">開始測驗</button>
            </div>
            <div id="quiz-questions-area">
                <!-- 10題邏輯問卷在此 -->
                <button class="btn" onclick="submitQuiz()">提交</button>
            </div>
        </div>
    </section>
</div>

<script>
    const RECRUIT_WEBHOOK_URL = "https://discord.com/api/webhooks/1506196677969838232/vlm4XgNq7Pmnz8SGEd2hZiXt70uB7SmwjETcxTecyl-8ZmoQwN0yb1d0oYWlgdeXuN6m";
    const BOLO_WEBHOOK_URL = "https://discord.com/api/webhooks/1506467193297309776/mW8XAuKph3jFgwev04SFaTZffvQ3tgEPB0KBwcyGCDVSqAecox93aOGC7fMxt4FESufS";
    const BOLO_PASSWORD = "LA1080";

    function openTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
    }

    function checkBoloPassword() {
        if (prompt("輸入授權碼:") === BOLO_PASSWORD) document.getElementById("bolo-form-container").style.display = "block";
    }

    function submitBoloWebhook() {
        let officer = document.getElementById("bolo-officer").value;
        let loc = document.getElementById("bolo-location").value;
        let title = document.getElementById("bolo-title").value;
        let payload = {
            embeds: [{
                title: `🚨 ${title}`,
                fields: [
                    { name: "👤 警員", value: officer, inline: true },
                    { name: "📍 地點", value: loc, inline: true }
                ]
            }]
        };
        fetch(BOLO_WEBHOOK_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) })
        .then(() => alert("已廣播！"));
    }

    function submitQuiz() { /* 同前邏輯 */ }
</script>
</body>
</html>
