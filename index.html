<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOS ANGELES PROJECT | 官方公共安全與司法完全體終端</title>
    <style>
        /* 全域設定 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: #e0e0e0; line-height: 1.6; }
        
        /* 頂部導覽列 */
        header { background-color: #1a1a1a; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #1e40af; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 15px; }
        .logo-area { display: flex; align-items: center; gap: 20px; }
        .logo { font-size: 1.5rem; font-weight: bold; color: #ffffff; letter-spacing: 2px; }
        .logo span { color: #f59e0b; }
        .la-clock { background-color: #000; padding: 6px 12px; border-radius: 4px; border: 1px solid #333; font-family: 'Courier New', Courier, monospace; color: #ef4444; font-weight: bold; font-size: 0.9rem; }
        nav ul { list-style: none; display: flex; gap: 10px; flex-wrap: wrap; }
        nav a { color: #e0e0e0; text-decoration: none; font-weight: 500; font-size: 0.9rem; transition: 0.3s; cursor: pointer; padding: 8px 12px; border-radius: 4px; background-color: #222; }
        nav a:hover, nav a.active { background-color: #1e40af; color: white; }

        /* 頁籤內容 */
        .tab-content { display: none; animation: fadeIn 0.4s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 版面 */
        section { padding: 40px 5%; max-width: 1200px; margin: 0 auto; min-height: 75vh; }
        h2.section-title { font-size: 1.8rem; margin-bottom: 25px; color: #fff; border-left: 5px solid #1e40af; padding-left: 15px; }
        .btn { display: inline-block; background-color: #1e40af; color: white; padding: 12px 28px; text-decoration: none; border-radius: 5px; font-weight: bold; transition: 0.3s; border: none; cursor: pointer; margin-top: 15px; text-align: center; }
        .btn:hover { background-color: #1e3a8a; }

        /* 公告欄 */
        .announcement-box { background-color: #1a1a1a; border-left: 5px solid #f59e0b; padding: 25px; border-radius: 8px; margin-bottom: 40px; border: 1px solid #333; }
        .announcement-item { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #333; }
        .announce-date { color: #f59e0b; font-weight: bold; font-size: 0.85rem; margin-bottom: 5px; display: inline-block; background-color: rgba(245, 158, 11, 0.1); padding: 3px 8px; border-radius: 4px; }
        .announce-title { color: #fff; font-size: 1.1rem; margin-bottom: 5px; font-weight: bold; }
        .announce-text { color: #aaa; font-size: 0.95rem; white-space: pre-line; }
        .admin-panel-box { background-color: #161616; border: 1px dashed #ef4444; padding: 20px; border-radius: 6px; margin-top: 30px; display: none; }

        /* 其他原有樣式 (accordion, grid, etc...) */
        .search-container { margin-bottom: 25px; }
        .search-bar { width: 100%; padding: 15px; background-color: #1e1e1e; border: 1px solid #333; color: white; border-radius: 6px; font-size: 1rem; }
        .accordion { background-color: #1e1e1e; color: #fff; cursor: pointer; padding: 18px; width: 100%; text-align: left; border: none; outline: none; font-size: 1.1rem; border-bottom: 1px solid #333; font-weight: bold; }
        .active-acc, .accordion:hover { background-color: #2a2a2a; border-left: 4px solid #1e40af; }
        .panel { padding: 0 18px; background-color: #121212; max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .panel p { padding: 12px 0; color: #aaa; border-bottom: 1px dashed #333; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; }
        .add-btn { background-color: #222; border: 1px solid #444; color: #aaa; padding: 4px 10px; border-radius: 3px; cursor: pointer; }
        .add-btn.selected { background-color: #ef4444; color: white; }
        
        .tip-box { background-color: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 30px; border-top: 4px solid #f59e0b; margin-top: 40px; }
        .quiz-box { background-color: #1e1e1e; padding: 30px; border-radius: 8px; border: 1px solid #333; }
        .quiz-options label { display: block; margin-bottom: 10px; color: #aaa; padding: 10px; background-color: #121212; border: 1px solid #222; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <div class="logo">LA<span> PROJECT</span></div>
            <div class="la-clock" id="la-time-display">LA TIME: LOADING...</div>
        </div>
        <nav>
            <ul>
                <li><a onclick="openTab('page-home')" id="nav-home" class="active">首頁大廳</a></li>
                <li><a onclick="openTab('page-bolo')" id="nav-bolo">🚨 全州通緝</a></li>
                <li><a onclick="openTab('page-depts')" id="nav-depts">各部門</a></li>
                <li><a onclick="openTab('page-rules')" id="nav-rules">法規全書</a></li>
                <li><a onclick="openTab('page-sop')" id="nav-sop">SOP與代碼</a></li>
                <li><a onclick="openTab('page-apply')" id="nav-apply">招募中心</a></li>
            </ul>
        </nav>
    </header>

    <div id="page-home" class="tab-content active">
        <section>
            <div class="hero">
                <h1>LOS ANGELES PROJECT</h1>
                <p>基於真實洛杉磯警政編制與加州司法框架。</p>
            </div>
            <h2 class="section-title">市政公告 (雲端同步系統)</h2>
            <div class="announcement-box" id="dynamic-announcement-area">
                <div style="text-align:center; color:#888;">📡 連線 Google 雲端中...</div>
            </div>
            <button class="btn" onclick="checkAdminPassword()">🛠️ 市政管理端 (更新公告)</button>
            <div class="admin-panel-box" id="admin-announcement-form">
                <select id="new-announce-tag"><option value="📢 [全州通告]">📢 [全州通告]</option><option value="🚨 [緊急法令]">🚨 [緊急法令]</option></select>
                <input type="text" id="new-announce-title" placeholder="標題">
                <textarea id="new-announce-text" rows="3" placeholder="內容"></textarea>
                <button class="btn" id="pub-btn" onclick="publishNewAnnounce()">🚀 發布全服</button>
            </div>
        </section>
    </div>

    <!-- 其餘頁籤內容維持不變 (省略顯示以節省空間，請繼續沿用先前代碼) -->
    
    <script>
        const CLOUD_API_URL = "https://script.google.com/macros/s/AKfycbwPuG2Vv7gOdPMtPv9jymzavc91HLA0crUmJOR5wUVn3P340jzAwZ5i8QmJdramLFnl/exec";

        // 動態公告讀取
        function fetchAnnouncements() {
            fetch(CLOUD_API_URL)
            .then(res => res.json())
            .then(data => {
                let html = "";
                data.forEach(item => {
                    html += `<div class="announcement-item"><div class="announce-date">${item.tag}</div><div class="announce-title">${item.title}</div><div class="announce-text">${item.text}</div></div>`;
                });
                document.getElementById("dynamic-announcement-area").innerHTML = html;
            });
        }
        fetchAnnouncements();

        // 發布新公告
        function publishNewAnnounce() {
            let tag = document.getElementById("new-announce-tag").value;
            let title = document.getElementById("new-announce-title").value.trim();
            let text = document.getElementById("new-announce-text").value.trim();
            
            fetch(CLOUD_API_URL)
            .then(res => res.json())
            .then(list => {
                list.unshift({tag, title, text});
                return fetch(CLOUD_API_URL, {
                    method: "POST",
                    body: JSON.stringify(list)
                });
            })
            .then(() => {
                alert("✅ 同步成功！");
                fetchAnnouncements();
            });
        }

        function checkAdminPassword() { if(prompt("密碼:") === "LA1080") document.getElementById("admin-announcement-form").style.display = "block"; }
        
        // (請在此處貼上你原本的 openTab, toggleLaw, submitTip, submitQuiz 等所有 JavaScript 函數...)
    </script>
</body>
</html>
